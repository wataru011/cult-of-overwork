name: Deploy to GitHub Pages

on:
  # main への push で自動デプロイ（github-pages 環境はデフォルトブランチを許可）
  push:
    branches:
      - main
  # 手動実行も可能
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（古いデプロイはキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # コミット数からバージョンを算出するため全履歴を取得
          fetch-depth: 0

      - name: Inject build version
        run: |
          VER="v$(git rev-list --count HEAD)+$(git rev-parse --short HEAD)"
          echo "Deploying version: ${VER}"
          sed -i "s/BUILD_VERSION_PLACEHOLDER/${VER}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ直下の静的ファイルをそのまま公開
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
